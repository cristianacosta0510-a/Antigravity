<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
        // Lógica original de videos interactivos para Bosque (usa click / 3 segundos)
        AFRAME.registerComponent('video-controls', {
            init: function () {
                var el = this.el;
                var videoEl = document.querySelector(el.getAttribute('src'));
                var textEl = el.querySelector('.video-text');

                if (videoEl) videoEl.pause();
                el.setAttribute('material', 'opacity', '0');
                el.setAttribute('material', 'transparent', 'true');

                el.addEventListener('click', function () {
                    if (videoEl && videoEl.paused) {
                        videoEl.play();
                        el.setAttribute('material', 'opacity', '1');
                        el.setAttribute('material', 'transparent', 'false');
                        if (textEl) textEl.setAttribute('visible', 'false');
                    } else if (videoEl) {
                        videoEl.pause();
                        el.setAttribute('material', 'opacity', '0');
                        el.setAttribute('material', 'transparent', 'true');
                        if (textEl) textEl.setAttribute('visible', 'true');
                    }
                });

                el.addEventListener('mouseleave', function () {
                    if (videoEl && !videoEl.paused) {
                        videoEl.pause();
                        el.setAttribute('material', 'opacity', '0');
                        el.setAttribute('material', 'transparent', 'true');
                        if (textEl) textEl.setAttribute('visible', 'true');
                    }
                });
            }
        });

        // Lógica de menús globales (cambio en 1 segundo de mantener la mirada)
        AFRAME.registerComponent('scene-switcher', {
            schema: { target: { type: 'string' } },
            init: function () {
                var el = this.el;
                var targetId = this.data.target;
                var timer;

                el.addEventListener('mouseenter', function () {
                    // Contamos 1 segundo específico para hiperespacio (1000ms)
                    timer = setTimeout(function () {
                        document.querySelectorAll('video').forEach(function (v) {
                            if (!v.paused) v.pause();
                        });

                        // Para no romper la inicialización de animaciones, en vez de "visible=false" movemos los cuartos enteros
                        // muy lejos (1000 metros abajo), de manera que están activos en todo momento tal como querías.
                        document.querySelector('#scene-bosque').setAttribute('position', '0 -1000 0');
                        document.querySelector('#scene-catedral').setAttribute('position', '0 -1000 0');
                        document.querySelector('#scene-sf').setAttribute('position', '0 -1000 0');

                        // Movemos la escena objetivo al punto cero
                        document.querySelector(targetId).setAttribute('position', '0 0 0');
                    }, 1000);
                });

                el.addEventListener('mouseleave', function () {
                    clearTimeout(timer);
                });
            }
        });
    </script>
    <title>Recorrido Completo VR</title>
</head>

<body>
    <a-scene>
        <a-camera position="0 1.6 0">
            <!-- Cursor global (fuse 3s para bosque) -->
            <a-cursor color="red" fuse="true" fuse-timeout="3000" raycaster="objects: .video-screen, .point, .menu-cube"
                animation__fusing="property: scale; startEvents: fusing; easing: linear; dur: 3000; from: 1 1 1; to: 0.1 0.1 0.1"
                animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
            </a-cursor>
        </a-camera>

        <!-- ================= ASSETS GLOBALES ================= -->
        <a-assets>
            <img src="img/Bosque1.png.jpeg" id="Bosque1">
            <img src="img/Bosque2.png.jpeg" id="Bosque2">
            <img src="img/Bosque3.png.jpeg" id="Bosque3">
            <img src="img/Bosque4.png.jpeg" id="Bosque4">
            <img src="img/Bosque5.png.jpeg" id="Bosque5">
            <img src="img/PisoBosque.png.jpeg" id="piso_bosque">
            <img src="img/CieloBosque.png.jpeg" id="CieloBosque">
            <img src="img/BosqueC.png.jpeg" id="imgBosqueC">

            <video id="vidBosque2" src="video/VID-20260406-WA0029.mp4" loop="true" crossorigin="anonymous"
                playsinline></video>
            <video id="vidBosque3" src="video/VID-20260406-WA0031.mp4" loop="true" crossorigin="anonymous"
                playsinline></video>
            <video id="vidBosque4" src="video/VID-20260406-WA0032.mp4" loop="true" crossorigin="anonymous"
                playsinline></video>

            <img src="img/Catedral1.png.jpeg" id="cat_pared1">
            <img src="img/Catedral2.png.jpeg" id="cat_pared2">
            <img src="img/Catedral3.png.jpeg" id="cat_pared3">
            <img src="img/Catedral4.png.jpeg" id="cat_pared4">
            <img src="img/Catedral5.png.jpeg" id="cat_pared5">
            <img src="img/cielo_mejorado.png" id="cat_pared6">
            <img src="img/piso_morelia.png" id="piso_morelia">
            <img src="img/IMG-20260406-WA0048.jpg" id="poster_catedral">
            <img src="img/Cate1.jpeg" id="cate1">
            <img src="img/Cate2.jpeg" id="cate2">
            <video id="videoCat1" src="video/Video catedral1.mp4" loop crossorigin="anonymous" playsinline></video>
            <video id="videoCat2" src="video/Video catedral2.mp4" loop crossorigin="anonymous" playsinline></video>

            <img src="img/SanFra1.png.jpeg" id="sf_pared1">
            <img src="img/SanFRa2.png.jpeg" id="sf_pared2">
            <img src="img/SanFra3.png.jpeg" id="sf_pared3">
            <img src="img/SanFra4.png.jpeg" id="sf_pared4">
            <img src="img/piso_fuente_nuevo.png" id="sf_pared5">
            <img src="img/CieloSanFra.png.jpeg" id="sf_pared6">
            <video id="videoSF" src="video/Historia del Templo de San Francisco .mp4" loop="true" preload="auto"
                crossorigin="anonymous" playsinline></video>
            <img src="img/SanFRa.png.jpeg" id="imgSF">
            <img src="img/SanF.png" id="imgSF2">
            <img src="img/SANTOf.png" id="imgSF3">
            <img src="img/Sinfi.png" id="imgSF4">
        </a-assets>

        <!-- ================= MENÚ GLOBAL DE CUBOS ================= -->
        <a-entity position="0 0.5 -4">
            <!-- Bosque Menu Cube -->
            <a-box class="menu-cube point" color="#228B22" position="-3 0 0" scale="0.7 0.7 0.7"
                scene-switcher="target: #scene-bosque">
                <a-text value="Bosque" align="center" position="0 0.8 0" scale="1.5 1.5 1.5" color="#00FFFF"></a-text>
            </a-box>
            <!-- Catedral Menu Cube -->
            <a-box class="menu-cube point" color="#E5989B" position="0 0 0" scale="0.7 0.7 0.7"
                scene-switcher="target: #scene-catedral">
                <a-text value="Catedral" align="center" position="0 0.8 0" scale="1.5 1.5 1.5" color="#00FFFF"></a-text>
            </a-box>
            <!-- San Fco Menu Cube -->
            <a-box class="menu-cube point" color="#1D3557" position="3 0 0" scale="0.7 0.7 0.7"
                scene-switcher="target: #scene-sf">
                <a-text value="San Francisco" align="center" position="0 0.8 0" scale="1.5 1.5 1.5"
                    color="#00FFFF"></a-text>
            </a-box>
        </a-entity>


        <!-- ================= ESCENA 1: BOSQUE ================= -->
        <!-- Inicia visible en centro 0 0 0 -->
        <a-entity id="scene-bosque" position="0 0 0">
            <!-- Panel 1: Frente -->
            <a-entity position="0 0 -7.4" rotation="0 0 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#bosque_panel1').emit('show');"
                    onmouseleave="document.querySelector('#bosque_panel1').emit('hide');">
                    <a-text value="Checa esto" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="bosque_panel1" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="3.2" height="4.2" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#imgBosqueC" width="3" height="4"></a-image>
                </a-entity>
            </a-entity>

            <a-plane material="src: #Bosque1" position="0 2 -7.5" width="30" height="10"></a-plane>
            <a-plane material="src: #Bosque2" position="15 2 0" width="15" height="10" rotation="0 -90 0"></a-plane>

            <a-video src="#vidBosque2" position="14.9 2 0" width="10" height="5.625" rotation="0 -90 0"
                class="video-screen point" video-controls>
                <a-entity class="video-text" position="0 0 0.1"
                    text="value: Mirar 3s para\nReproducir / Pausar; align: center; width: 12; color: #00FFFF"
                    geometry="primitive: plane; width: 4.5; height: 1.5"
                    material="color: black; opacity: 0.7"></a-entity>
            </a-video>

            <a-plane material="src: #Bosque3" position="0 2 7.5" width="30" height="10" rotation="0 180 0"></a-plane>
            <a-video src="#vidBosque3" position="0 2 7.4" width="10" height="5.625" rotation="0 180 0"
                class="video-screen point" video-controls>
                <a-entity class="video-text" position="0 0 0.1"
                    text="value: Mirar 3s para\nReproducir / Pausar; align: center; width: 12; color: #00FFFF"
                    geometry="primitive: plane; width: 4.5; height: 1.5"
                    material="color: black; opacity: 0.7"></a-entity>
            </a-video>

            <a-plane material="src: #Bosque4" position="-15 2 0" width="15" height="10" rotation="0 90 0"></a-plane>
            <a-video src="#vidBosque4" position="-14.9 2 0" width="10" height="5.625" rotation="0 90 0"
                class="video-screen point" video-controls>
                <a-entity class="video-text" position="0 0 0.1"
                    text="value: Mirar 3s para\nReproducir / Pausar; align: center; width: 12; color: #00FFFF"
                    geometry="primitive: plane; width: 4.5; height: 1.5"
                    material="color: black; opacity: 0.7"></a-entity>
            </a-video>

            <a-plane material="src: #piso_bosque; color: #C2A385" position="0 -3 0" width="30" height="15.5"
                rotation="-90 0 0"></a-plane>
            <a-plane material="src: #CieloBosque" position="0 7 0" width="30" height="15.5" rotation="90 0 0"></a-plane>
        </a-entity>


        <!-- ================= ESCENA 2: CATEDRAL ================= -->
        <!-- Las escenas no activas inician a 1 kilómetro abajo para que sus motores inicien perfectos sin trabar a-frame -->
        <a-entity id="scene-catedral" position="0 -1000 0">
            <!-- Panel 1: Frente -->
            <a-entity position="0 0 -7.4" rotation="0 0 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#cat_panel1').emit('show');"
                    onmouseleave="document.querySelector('#cat_panel1').emit('hide');">
                    <a-text value="Catedral 1" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="cat_panel1" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="3.2" height="4.2" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#poster_catedral" width="3" height="4"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 2: Derecha -->
            <a-entity position="14.9 0 0" rotation="0 -90 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#cat_panel2').emit('show');"
                    onmouseleave="document.querySelector('#cat_panel2').emit('hide');">
                    <a-text value="Catedral 2" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="cat_panel2" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="5.6" height="3.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#cate1" width="5.4" height="3.04"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 3: Izquierda -->
            <a-entity position="-14.9 0 0" rotation="0 90 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#cat_panel3').emit('show');"
                    onmouseleave="document.querySelector('#cat_panel3').emit('hide');">
                    <a-text value="Catedral 3" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="cat_panel3" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="5.6" height="3.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#cate2" width="5.4" height="3.04"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 4: Atras -->
            <a-entity position="0 0 7.4" rotation="0 180 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#cat_panel4').emit('show'); var v = document.querySelector('#videoCat1'); if(v) v.play();"
                    onmouseleave="document.querySelector('#cat_panel4').emit('hide'); var v = document.querySelector('#videoCat1'); if(v) v.pause();">
                    <a-text value="Catedral 4" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="cat_panel4" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="7.1" height="4.1" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-video src="#videoCat1" width="7.1" height="4"></a-video>
                </a-entity>
            </a-entity>

            <!-- Panel 5: Techo -->
            <a-entity position="0 6.5 0" rotation="90 0 0">
                <a-plane class="point" position="0 0 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#cat_panel5').emit('show'); var v = document.querySelector('#videoCat2'); if(v) v.play();"
                    onmouseleave="document.querySelector('#cat_panel5').emit('hide'); var v = document.querySelector('#videoCat2'); if(v) v.pause();">
                    <a-text value="Catedral 5" align="center" width="10" color="#00FFFF" position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="cat_panel5" position="0 0 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="7.1" height="4.1" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-video src="#videoCat2" width="7.1" height="4"></a-video>
                </a-entity>
            </a-entity>

            <a-plane material="src: #cat_pared1" position="0 2 -7.5" width="30" height="10"></a-plane>
            <a-plane material="src: #cat_pared2" position="15 2 0" width="15" height="10" rotation="0 -90 0"></a-plane>
            <a-plane material="src: #cat_pared3" position="0 2 7.5" width="30" height="10" rotation="0 180 0"></a-plane>
            <a-plane material="src: #cat_pared4" position="-15 2 0" width="15" height="10" rotation="0 90 0"></a-plane>
            <a-plane material="src: #piso_morelia" position="0 -3 0" width="30" height="15.5"
                rotation="-90 0 0"></a-plane>
            <a-plane material="src: #cat_pared6" position="0 7 0" width="30" height="15.5" rotation="90 0 0"></a-plane>
        </a-entity>


        <!-- ================= ESCENA 3: SAN FRANCISCO ================= -->
        <a-entity id="scene-sf" position="0 -1000 0">
            <!-- Panel 1: Video -->
            <a-entity position="0 0 -7.4" rotation="0 0 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#sf_panel1').emit('show'); var v = document.querySelector('#videoSF'); if(v) v.play();"
                    onmouseleave="document.querySelector('#sf_panel1').emit('hide'); var v = document.querySelector('#videoSF'); if(v) v.pause();">
                    <a-text value="Visualiza esto" align="center" width="12" color="#00FFFF"
                        position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="sf_panel1" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="4.2" height="2.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-video src="#videoSF" width="4" height="2.25"></a-video>
                </a-entity>
            </a-entity>

            <!-- Panel 2: Imagen Publicidad -->
            <a-entity position="14.9 0 0" rotation="0 -90 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#sf_panel2').emit('show');"
                    onmouseleave="document.querySelector('#sf_panel2').emit('hide');">
                    <a-text value="San Francisco 2" align="center" width="10" color="#00FFFF"
                        position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="sf_panel2" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="5.6" height="3.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#imgSF" width="5.4" height="3.04"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 3: Espacio imagen -->
            <a-entity position="-14.9 0 0" rotation="0 90 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#sf_panel3').emit('show');"
                    onmouseleave="document.querySelector('#sf_panel3').emit('hide');">
                    <a-text value="San Francisco 3" align="center" width="10" color="#00FFFF"
                        position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="sf_panel3" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="5.6" height="3.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#imgSF2" width="5.4" height="3.04"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 4: Tercera Imagen -->
            <a-entity position="4 0 7.4" rotation="0 180 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#sf_panel4').emit('show');"
                    onmouseleave="document.querySelector('#sf_panel4').emit('hide');">
                    <a-text value="San Francisco 4" align="center" width="10" color="#00FFFF"
                        position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="sf_panel4" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="5.6" height="3.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#imgSF3" width="5.4" height="3.04"></a-image>
                </a-entity>
            </a-entity>

            <!-- Panel 5: Espacio imagen -->
            <a-entity position="-4 0 7.4" rotation="0 180 0">
                <a-plane class="point" position="0 1.5 0" width="4" height="0.75" color="#000" opacity="0.8"
                    onmouseenter="document.querySelector('#sf_panel5').emit('show');"
                    onmouseleave="document.querySelector('#sf_panel5').emit('hide');">
                    <a-text value="San Francisco 5" align="center" width="10" color="#00FFFF"
                        position="0 0 0.05"></a-text>
                </a-plane>
                <a-entity id="sf_panel5" position="0 3 0" scale="0 0 0"
                    animation__show="property: scale; from: 0 0 0; to: 1 1 1; dur: 450; easing: easeOutBack; startEvents: show"
                    animation__hide="property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInQuad; startEvents: hide">
                    <a-plane width="4.4" height="4.4" color="#FFF" position="0 0 -0.05"></a-plane>
                    <a-image src="#imgSF4" width="4.2" height="4.2"></a-image>
                </a-entity>
            </a-entity>

            <a-plane material="src: #sf_pared1" position="0 2 -7.5" width="30" height="10"></a-plane>
            <a-plane material="src: #sf_pared2" position="15 2 0" width="15" height="10" rotation="0 -90 0"></a-plane>
            <a-plane material="src: #sf_pared3" position="0 2 7.5" width="30" height="10" rotation="0 180 0"></a-plane>
            <a-plane material="src: #sf_pared4" position="-15 2 0" width="15" height="10" rotation="0 90 0"></a-plane>
            <a-plane material="src: #sf_pared5" position="0 -3 0" width="30" height="15" rotation="-90 0 0"></a-plane>
            <a-plane material="src: #sf_pared6" position="0 7 0" width="30" height="15" rotation="90 0 0"></a-plane>
        </a-entity>

    </a-scene>
</body>

</html>
